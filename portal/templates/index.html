<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WiFi Access - Payment Required</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo svg {
            width: 60px;
            height: 60px;
            fill: #667eea;
        }
        
        h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .price {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            margin-bottom: 30px;
        }
        
        .price-amount {
            font-size: 36px;
            font-weight: bold;
            color: #667eea;
        }
        
        .price-currency {
            font-size: 18px;
            color: #666;
        }
        
        .price-duration {
            font-size: 14px;
            color: #999;
            margin-top: 5px;
        }
        
        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        
        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
        }
        
        .info {
            background: #e8f4f8;
            color: #333;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            font-size: 13px;
            text-align: center;
        }
        
        .payment-methods {
            text-align: center;
            margin-top: 15px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <svg viewBox="0 0 24 24">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
            </svg>
        </div>
        
        <h1>WiFi Access</h1>
        <p class="subtitle">Pay securely to get instant internet access</p>
        
        <div class="price">
            <div class="price-amount">1.00</div>
            <div class="price-currency">CHF</div>
            <div class="price-duration">5 minutes of internet access</div>
        </div>
        
        <button class="btn btn-primary" id="payBtn" onclick="initiatePayment()">
            Pay with Card
        </button>
        
        <div class="payment-methods">
            Secure payment via Stripe
        </div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Redirecting to payment...</p>
        </div>
        
        <div class="error" id="error"></div>
        
        <div class="info">
            Your IP: {{ client_ip }}<br>
            Secure payment via Stripe
        </div>
    </div>

    <script>
        async function initiatePayment() {
            const btn = document.getElementById('payBtn');
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            
            btn.disabled = true;
            loading.style.display = 'block';
            error.style.display = 'none';
            
            try {
                const response = await fetch('/payment/initiate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                
                const data = await response.json();
                
                if (data.checkout_url) {
                    window.location.href = data.checkout_url;
                } else if (data.error) {
                    throw new Error(data.error);
                } else {
                    throw new Error('Invalid response from server');
                }
            } catch (err) {
                loading.style.display = 'none';
                btn.disabled = false;
                error.textContent = err.message || 'Payment initiation failed. Please try again.';
                error.style.display = 'block';
            }
        }
        
        async function checkSession() {
            try {
                const response = await fetch('/session/check');
                const data = await response.json();
                
                if (data.active) {
                    window.location.href = '/';
                }
            } catch (err) {
                console.error('Session check failed:', err);
            }
        }
        
        setInterval(checkSession, 5000);
    </script>
</body>
</html>
