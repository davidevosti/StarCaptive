services:
  captive-portal:
    build: .
    ports:
      - "7070:5000"
    volumes:
      - ./data:/data
    environment:
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-sk_test_placeholder}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-whsec_placeholder}
      - STRIPE_SUCCESS_URL=${STRIPE_SUCCESS_URL:-http://localhost:7070/payment/success?session_id={CHECKOUT_SESSION_ID}}
      - STRIPE_CANCEL_URL=${STRIPE_CANCEL_URL:-http://localhost:7070/payment/cancel}
      - SESSION_DURATION=${SESSION_DURATION:-300}
      - DATABASE_PATH=/data/sessions.db
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    restart: unless-stopped
